name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DROPLET_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Crear carpeta destino en el Droplet
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DROPLET_PORT }}" \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "mkdir -p /var/www/html/ghholamundo"

      - name: Deploy con rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DROPLET_PORT }}" \
            ./ \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/var/www/html/ghholamundo"

      - name: Post-deploy opcional
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DROPLET_PORT }}" \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" \
            "cd /var/www/html/ghholamundo && echo 'Deploy completado'"
